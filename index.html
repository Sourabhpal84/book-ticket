<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comedy Night</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #dadcd8; /* clean white */
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
p {
  font-size: 14px;
  color: #555;
  line-height: 1.6;
  font-weight: 500;
}

/* TOP GRADIENT */
.top-bar {
  height: 140px;
  background: linear-gradient(135deg, #ff0055, #ff7700);
  border-bottom-left-radius: 30px;
  border-bottom-right-radius: 30px;
  box-shadow: 0 10px 40px rgba(255,0,100,0.3);
}

/* CONTAINER */
.container {
  max-width: 420px;
  margin: auto;
  margin-top: -90px;
  padding: 15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border-radius: 25px;
  padding: 20px;
  box-shadow: 
    0 25px 80px rgba(0,0,0,0.3),
    inset 0 0 20px rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.2);
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
}

.banner {
  width: 100%;
  border-radius: 20px;
  max-height: 220px;
  object-fit: cover;
  transition: 0.5s;
}

.banner:hover {
  transform: scale(1.08) rotate(1deg);
}

/* TITLE */
.title {
  text-align: center;
  font-size: 34px;
  font-weight: 800;
  margin-top: 15px;
  letter-spacing: 1px;

  color: #ffffff;

  /* 🔥 Solid 3D shadow (no glow) */
  text-shadow:
    1px 1px 0 #999,
    2px 2px 0 #888,
    3px 3px 0 #777,
    4px 4px 6px rgba(0,0,0,0.5);
}

@keyframes glowText {
  from {
    text-shadow: 
      2px 2px 0 #ff0055,
      4px 4px 0 #ff7700,
      0 0 10px #ff0055;
  }
  to {
    text-shadow: 
      2px 2px 0 #ff7700,
      4px 4px 0 #ff0055,
      0 0 20px #ff7700;
  }
}

/* TAG */
.tag {
  display: inline-block;
  background: linear-gradient(45deg, #ff0055, #ff7700);
  color: white;
  padding: 6px 14px;
  border-radius: 30px;
  font-size: 12px;
  margin-top: 6px;
  box-shadow: 0 5px 15px rgba(255,0,100,0.3);
}

.tag1 {
  display: block; /* 👈 important */
  width: fit-content;
  margin: 10px auto; /* 👈 center */

  background: linear-gradient(45deg, #ff0055, #ff7700);
  color: white;
  padding: 6px 14px; /* thoda better spacing */
  border-radius: 15px;
  font-size: 12px;
  box-shadow: 0 5px 15px rgba(255,0,100,0.3);
}

/* EVENT INFO GRID */
.info-box {
  margin-top: 15px;
  background: #ffffff;
  padding: 16px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 500;
  color: #333;
  border: solid black 1px;
  line-height: 1.6;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* FORM */
.form {
  margin-top: 15px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  background: #ffffff;   /* solid white */
  color: #333;           /* dark text */
  font-size: 14px;
  border: solid black 1px;
}

input::placeholder {
  color: #888;
}

input:focus {
  border: 1px solid #ff7700;
  outline: none;
  box-shadow: 0 0 6px rgba(255,119,0,0.3);
}
/* BUTTON */
button {
  width: 100%;
  padding: 16px;
  border-radius: 15px;
  border: none;
  font-size: 16px;
  color: white;
  background: linear-gradient(45deg, #ff0055, #ff7700);
  box-shadow: 
    0 10px 30px rgba(255,0,100,0.5),
    inset 0 0 10px rgba(255,255,255,0.3);
  position: relative;
  overflow: hidden;
}

button::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
  top: 0;
  left: -100%;
  transition: 0.5s;
}

button:hover::before {
  left: 100%;
}

/* STICKY FOOTER */
.footer {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  border-radius: 20px;
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.1);
  padding: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.footer button {
  font-size: 17px;
  letter-spacing: 0.6px;
}

/* POPUP */
#successPopup {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}

.popup-box {
  background: white;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  width: 280px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  animation: pop 0.3s ease;
}
@media(max-width:480px){

  .container {
    padding: 12px;
  }

  .title {
    font-size: 22px;
  }

  .info {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  input {
    padding: 13px;
  }

  button {
    padding: 14px;
    font-size: 15px;
  }
}
.card {
  animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes pop {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

/* MOBILE */
@media(max-width:480px){
  .title { font-size: 20px; }
}

.container {
  max-width: 420px;
  margin: auto;
  margin-top: -90px;
  padding: 15px;
  padding-bottom: 100px; /* 👈 IMPORTANT */
}

.particles {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.2;
  pointer-events: none;
}
.highlight {
  margin-top: 12px;
  font-size: 13px;
  padding: 10px 12px;
  border-radius: 10px;
  background: #f1f5f9;
  color: #333;
  border-left: 4px solid #111;
  font-weight: 500;
}
</style>
</head>

<body>

<div class="top-bar"></div>

<div class="container">

<div class="card">

<img src="baneer4.jpeg" class="banner">


<!-- <div class="tag1"><div class="title">Befizool ki Baatein</div></div> -->
<div class="tag">Ticket ₹199 only</div>

<div id="offerTag" style="color:yellow; text-align:center; margin-top:10px;"></div>

<div class="info-box">
  📅 <b>25 April 2026</b><br><br>
  
  ⏰ 5:00 PM<br><br>
  
  ⏳ 1 Hour 30 Minutes<br><br>
  
  👤 Age Limit: 12+<br><br>
  
  🌐 Hindi, English<br><br>
  
  🎭 Poetry, Comedy<br><br>
  
  📍 Artist Voice Studio, Shastri nagar Delhi
</div>


<p class="highlight">
  Hemant Gaur & Ashish Kumar 
</p>

<div class="form">
<input type="text" id="name" placeholder="Your Name">
<input type="tel" id="phone" placeholder="Phone Number">
<input type="number" id="tickets" placeholder="Tickets">
<input type="text" id="promo" placeholder="Promo Code (optional)">
<p id="priceDisplay" style="text-align:center; font-weight:bold;">
  Total: ₹0
</p>
</div>

</div>

</div>

<!-- STICKY CTA -->
<div class="footer">
<button onclick="payNow()">🎟️ Loading...</button>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBaPN1a6qKdycroI-_IMLQA6ry7qPzrtRo",
  authDomain: "magneetoz.firebaseapp.com",
  databaseURL: "https://magneetoz-default-rtdb.firebaseio.com",
  projectId: "magneetoz"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);






let totalSold = 0;
let ticketPrice = 149;

onValue(ref(db, "orders/"), (snapshot) => {
  totalSold = 0;

 if(snapshot){
  snapshot.forEach((child) => {
    let data = child.val();
    totalSold += Number(data.tickets || 0);
  });
 }

  if(totalSold < 20){
    ticketPrice = 149;
  } else {
    ticketPrice = 199;
  }

  updateUI();
});
updateUI();
document.getElementById("tickets").addEventListener("input", updatePrice);
document.getElementById("promo").addEventListener("input", updatePrice);

const coupons = {
  "free11": 1,
  "sour20": 20,
  "ash40": 40,
  "hem50x": 50,
  "sour60z": 60,
  "ash70k": 70,
  "hem80p": 80,
  "sour90q": 90,
  "ash100x": 100,
  "hem110z": 110,
  "sour120p": 120,
  "ash130k": 130,
  "hem140q": 140,
  "sour150x": 150
};

function updatePrice(){

  let tickets = Number(document.getElementById("tickets").value) || 0;
  let promo = document.getElementById("promo").value.trim().toLowerCase();

  let finalPrice = ticketPrice;

  if(coupons[promo]){
  finalPrice = coupons[promo];
 }

  let total = tickets * finalPrice;

  document.getElementById("priceDisplay").innerText = `Total: ₹${total}`;

  // color
  if(promo === "free11"){
    document.getElementById("priceDisplay").style.color = "green";
  } else {
    document.getElementById("priceDisplay").style.color = "black";
  }
}
updatePrice();

function updateUI(){

  let btn = document.querySelector(".footer button");
  let tag = document.getElementById("offerTag");

  if(totalSold < 20){
    btn.innerText = `🎟️ Early Bird ₹149 (${Math.max(0, 20 - totalSold)} left 🔥)`;
    tag.innerText = "🔥 Early Bird Offer Active";
    tag.style.color = "green";
  } else {
    btn.innerText = `🎟️ Book Now ₹199`;
    tag.innerText = "";
  }
}





window.payNow = function(){

  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let tickets = document.getElementById("tickets").value;
  let promo = document.getElementById("promo").value.trim();

  if(!name || !phone || !tickets){
    alert("Fill details");
    return;
  }

  tickets = Number(tickets); // safe

 let finalPrice = ticketPrice;

 // 🎯 PROMO APPLY
 let code = promo.toLowerCase();

 if(coupons[code]){
  finalPrice = coupons[code];
 }

  let options = {
  key: "rzp_live_SVyEXhZPb4HTJf",
  amount: tickets * finalPrice * 100,
  currency: "INR",

  name: "MAGNEETOZ",
  description: "Event Ticket",

  handler: function(response){

    if(response.razorpay_payment_id){

    let orderData = {
     name: name,
     phone: phone,
     tickets: tickets,
     payment_id: response.razorpay_payment_id,
     time: new Date().toISOString(),

     // 🔥 YE ADD KAR
     promo: promo || null,
     price: finalPrice
     };

      push(ref(db, "orders/"), orderData);

      showPopup();
    }
  }
};

  new Razorpay(options).open();
}

window.showPopup = function(){
  document.getElementById("successPopup").style.display="flex";
}

window.closePopup = function(){
  document.getElementById("successPopup").style.display="none";
}

</script>

<!-- POPUP -->
<div id="successPopup">
  <div class="popup-box">
    <h2>🎉 Booking Confirmed</h2>
    <p>Check WhatsApp for details 📲</p>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<div class="particles"></div>

</body>
</html>
